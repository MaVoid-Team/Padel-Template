version: "3.9"

services:
  app:
    build: .
    image: padel-club:latest
    container_name: padel-club-app
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3070:3000" # host-level Nginx will proxy to this
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional one-off migration job (run manually when needed)
  migrate:
    build: .
    image: padel-app:latest
    command: ["npx", "prisma", "migrate", "deploy"]
    env_file:
      - ./.env
    depends_on:
      - db
    networks:
      - internal
    profiles: ["migrate"]


volumes:
  db_data:

networks:
  internal:
