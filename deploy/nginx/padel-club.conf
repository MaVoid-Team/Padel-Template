# Nginx Reverse Proxy Configuration for Padel Club
# Place this file in: /etc/nginx/sites-available/padel-club
# Then enable it: ln -s /etc/nginx/sites-available/padel-club /etc/nginx/sites-enabled/

upstream padel_backend {
    # Points to the Docker container port on localhost
    server 127.0.0.1:3070;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name padel.example.com www.padel.example.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name padel.example.com www.padel.example.com;

    # SSL Certificates (replace with your certificate paths)
    ssl_certificate /etc/letsencrypt/live/padel.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/padel.example.com/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Client upload size limit
    client_max_body_size 50M;

    # Proxy settings for Next.js
    location / {
        proxy_pass http://padel_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }

    # Static assets caching
    location /_next/static/ {
        alias /var/www/padel/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Public assets caching
    location /public/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Health check endpoint
    location /health {
        proxy_pass http://padel_backend;
        access_log off;
    }
}
